version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: avaye-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_here
      MONGO_INITDB_DATABASE: avaye-yaghin
    volumes:
      - mongodb_data:/data/db
    networks:
      - avaye-network

  backend:
    build: ./backend
    container_name: avaye-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:secure_password_here@mongodb:27017/avaye-yaghin
      AI_API_KEY: ${AI_API_KEY}
      FRONTEND_URL: http://localhost:3000
      ADMIN_SECRET: Amidhjsos62627@_897
    depends_on:
      - mongodb
    networks:
      - avaye-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: avaye-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:5000
    depends_on:
      - backend
    networks:
      - avaye-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    container_name: avaye-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - avaye-network

networks:
  avaye-network:
    driver: bridge

volumes:
  mongodb_data:
